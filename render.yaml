services:
  - type: web
    name: banco-api
    runtime: python
    plan: free
    rootDir: banco
    buildCommand: pip install -r requirements.txt && python manage.py migrate --noinput
    startCommand: gunicorn banco.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: SECRET_KEY
        generateValue: true
